# Build du mod et exécution des vérifications à chaque push / pull request.
# Avec Fabric Loom + fabricApi.configureTests, la tâche Gradle `check` inclut
# `runGameTest` (Game Tests serveur). La tâche `build` dépend de `check`, donc
# les tests sont bien lancés avec `./gradlew build`.

name: build
on: [pull_request, push]

jobs:
  build:
    strategy:
      matrix:
        java: [21]
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and run tests (check: JUnit + Fabric Game Tests)
        run: ./gradlew build --no-daemon --stacktrace

      - name: capture build artifacts
        if: ${{ matrix.java == 21 }}
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
